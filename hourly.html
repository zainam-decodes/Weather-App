<!-- hourly.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hourly Forecast</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <img src="assets/logo.png" class="logo" />
    <nav>
      <a href="index.html">Today</a>
      <a href="hourly.html" class="active">Hourly</a>
      <a href="daily.html">Daily</a>
      <a href="radar.html">Radar</a>
      <a href="monthly.html">Monthly</a>
      <a href="air-quality.html">Air Quality</a>
      <a href="health.html">Health</a>
    </nav>
  </header>

  <main>
    <section class="search">
      <input type="text" id="cityInput" placeholder="Enter city">
      <button onclick="getHourlyWeather()">Search</button>
    </section>

    <section id="hourlyWeather" class="forecast-container"></section>
  </main>

  <script src="config.js"></script>
  <script>
    async function getHourlyWeather() {
      const city = document.getElementById('cityInput').value;
      if (!city) return alert("Enter a city");

      const geoRes = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=1&appid=${API_KEY}`);
      const geo = await geoRes.json();
      if (!geo.length) return alert("City not found");

      const { lat, lon } = geo[0];

      const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`);
      const data = await res.json();

      document.getElementById("hourlyWeather").innerHTML = data.list.slice(0, 24).map(hour => {
        const dt = new Date(hour.dt * 1000);
        return `
          <div class="hour-card">
            <h3>${dt.getHours()}:00</h3>
            <img src="https://openweathermap.org/img/wn/${hour.weather[0].icon}@2x.png" alt="">
            <p>${hour.main.temp}°C</p>
            <p>${hour.weather[0].main}</p>
            <p>💧 ${hour.main.humidity}%</p>
            <p>💨 ${hour.wind.speed} m/s</p>
          </div>
        `;
      }).join('');

      document.body.style.backgroundImage = `url('https://source.unsplash.com/1600x900/?${data.list[0].weather[0].main},sky')`;
    }
  </script>
</body>
</html>
