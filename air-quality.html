<!-- air-quality.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Air Quality</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <img src="assets/logo.png" class="logo" />
    <nav>
      <a href="index.html">Today</a>
      <a href="hourly.html">Hourly</a>
      <a href="daily.html">Daily</a>
      <a href="radar.html">Radar</a>
      <a href="monthly.html">Monthly</a>
      <a href="air-quality.html" class="active">Air Quality</a>
      <a href="health.html">Health</a>
    </nav>
  </header>

  <main>
    <section class="search">
      <input type="text" id="cityInput" placeholder="Enter city">
      <button onclick="getAirQuality()">Search</button>
    </section>

    <section id="airQuality" class="forecast-container">
      <!-- AQI data goes here -->
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    const AQI_LEVELS = [
      "Good 😊",
      "Fair 🙂",
      "Moderate 😐",
      "Poor 😷",
      "Very Poor 😫"
    ];

    const HEALTH_TIPS = [
      "Air quality is ideal for outdoor activities.",
      "Enjoy your day, just avoid prolonged exposure near traffic.",
      "Limit intense outdoor exercise for sensitive groups.",
      "Avoid outdoor activities. Use a mask if going out.",
      "Stay indoors. Use air purifiers and keep windows closed."
    ];

    async function getAirQuality() {
      const city = document.getElementById('cityInput').value;
      if (!city) return alert("Enter a city");

      const geoRes = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=1&appid=${API_KEY}`);
      const geo = await geoRes.json();
      if (!geo.length) return alert("City not found");

      const { lat, lon } = geo[0];
      const res = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
      const data = await res.json();
      const aqi = data.list[0].main.aqi;

      document.getElementById("airQuality").innerHTML = `
        <div class="hour-card">
          <h2>Air Quality in ${city}</h2>
          <p>🌫️ AQI Level: ${AQI_LEVELS[aqi - 1]}</p>
          <p>🫁 Tip: ${HEALTH_TIPS[aqi - 1]}</p>
        </div>
      `;

      document.body.style.backgroundImage = `url('https://source.unsplash.com/1600x900/?air,sky,clean')`;
    }
  </script>
</body>
</html>
